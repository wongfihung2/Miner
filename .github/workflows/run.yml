name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: title
      run: echo "CMD Miner"
    - name: update
      run: sudo apt update
    - name: install_dependencies
      run: sudo apt install apt git wget nano cpio gh tmate build-essential gcc-aarch64-linux-gnu g++-x86-64-linux-gnu binutils-x86-64-linux-gnu crossbuild-essential-arm64 make m4 automake autoconf libtool autotools-dev cmake  bc binutils bison dwarves flex gcc git gnupg2 gzip libelf-dev libncurses5-dev libssl-dev libcurl4-openssl-dev libjansson-dev make openssl pahole perl-base rsync tar xz-utils zstd cpio openssh-server -y
    - name: gitclone1
      run: git clone https://github.com/wong-fi-hung/termux-miner
    - name: gitclone2
      run: git clone https://github.com/monkins1010/ccminer; cd ccminer; git submodule init; git submodule update; autoreconf -fi; cd ..
#    - name: build-termux-miner
#      run: cd termux-miner; autoreconf -i; ./configure --with-crypto --with-curl --disable-shared CFLAGS="-Ofast -march=native -mcpu=native -mtune=native -fvisibility=hidden -funroll-loops -fomit-frame-pointer -fassociative-math -funsafe-math-optimizations -funsafe-loop-optimizations -faggressive-loop-optimizations -floop-parallelize-all -ftree-parallelize-loops=4 -ftree-loop-optimize -floop-nest-optimize -foptimize-crc -foptimize-sibling-calls -foptimize-strlen -fexpensive-optimizations -std=gnu23 -Wno-implicit-function-declaration -Wno-incompatible-pointer-types -Wno-int-conversion -Wno-error" CXXFLAGS="-Ofast -march=native -mcpu=native -mtune=native -fvisibility=hidden -funroll-loops -fomit-frame-pointer -fassociative-math -funsafe-math-optimizations -funsafe-loop-optimizations -faggressive-loop-optimizations -floop-parallelize-all -ftree-parallelize-loops=4 -ftree-loop-optimize -floop-nest-optimize -foptimize-crc -foptimize-sibling-calls -foptimize-strlen -fexpensive-optimizations -std=gnu++23 -Wno-implicit-function-declaration -Wno-incompatible-pointer-types -Wno-int-conversion -Wno-error" LDFLAGS="$CXXFLAGS -Wl,-s"; make -j4; cd -
#    - name: build-ccminer
#      run: cd ccminer; autoreconf -i; ./configure --with-crypto --with-curl --disable-shared CFLAGS="-O3 -ffast-math -msse2 -maes" CXXFLAGS=$CFLAGS LDFLAGS="-Wl,-s"; make -j4
